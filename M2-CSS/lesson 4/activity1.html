<!doctype html>
<html>

<head>
    <title>Module 2 - Lesson 4 - Activity 1 - My Food Menu</title>
    <style>
        body {
            font-family: Arial;
            background: #fff8f0;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #e65c00;
        }

        /* Sibling Selector - styles the paragraph right after h1 */
        h1 + p {
            color: #e65c00;
            background-color: #ffe0ff;
            padding: 10px 20px;
            border-radius: 5px;
            
        }
        ul {
            padding: 0;
            margin-top: 20px;
        }

        /* Child Selector - styles only direct li children of ul */
        ul > li {
            list-style-type: none;
            font-size: 20px;
            font-weight: bold;
            background:fixed #ffe0ff;
            border-radius: 5px;
            color:#5d4037;
            padding: 10px;
            margin: 10px auto;
            width: 300px;


        }

        /* nth-child - highlights the 3rd item as Chef's Special */
        ul > li:nth-child(3) {
            background-color: #ffcc80;
            color: #e65100;
        }
        .desc {
            color: #555555;
            margin-top: 20px;
            font-size: 15px;
            width: 400px;
            margin: 0 auto;
        }

        /* first-letter - makes the first letter big and bold */
        .desc::first-letter {
            font-size: 30px;
            font-weight: bold;
            color: #e65c00;
        }
        .links {
            margin-top: 25px;
        }

        /* Hover Effect - links glow when mouse moves over them */
         a {
            text-decoration: none;
            
            font-size:15px;
            border-radius: 5px;
            border: 1px solid #e65c00;
            padding: 5px 5px;
            margin: 5px;
            display: inline-block;
            transition:all 0.3s ease-in-out;
        }
        a:hover {
            box-shadow: 0 0 20px #e65c00;
            background-color:#e65c00;
            color:white;
            transform: scale(1.5);
           
            
        }
    </style>
</head>

<body>
    <h1>My Food Menu</h1>
    <p>Pick your favourite dish and dig in!</p>

    <ul>
        <li>Pizza</li>
        <li>Burger</li>
        <li>Tacos — Chef's Special!</li>
        <li>Noodles</li>
        <li>Ice Cream</li>
    </ul>

    <p class="desc">
        Every dish on this menu is made with love and loads of flavour. Try them
        all and find your favourite!
    </p>

    <div class="links">
        <a href="#">Order Now</a>
        <a href="#">See More</a>
    </div>
</body>

</html>
