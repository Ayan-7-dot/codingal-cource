<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MODULE 2 - LESSON 1 - ACTIVITY 1 - My Colour Card</title>

    <!-- INTERNAL CSS -->
    <style>
        *{
            font-weight:400;
        }
        h1{
            color:darkblue;
            font-style:italic
        }
        h2{
            color:blue;
        }
        body{
            background-color: lightcyan;
        }
        #my-card{
            color:turquoise;
        }
        .text-color-purple{
            color:burlywood;
        }
        .italic{
            font-style:italic;
        }
        .underline{
            text-decoration:underline;
        }
    </style>

</head>

<body>
    <h1>My Colour Card</h1>

    <!-- Inline CSS: Add style="color: ____;" inside this p tag -->
    <p style="color: crimson">Hi! This is my very own webpage.</p>

    <div id="my-card">
        <h2>About Me</h2>
        <p class="text-color-purple italic">My name is Sam.</p>
        <p class="text-color-purple underline">My favourite colour is red.</p>
        <p class="text-color-purple">My favourite subject is Maths.</p>
        <p class="text-color-purple">My favourite food is pasta.</p>
    </div>

    <h2>My Favourite Things</h2>
    <p class="text-color-purple">My favourite animal is a cat.</p>
    <p>My favourite sport is cricket.</p>
    <p>My favourite movie is The Lion King.</p>
</body>

</html>
